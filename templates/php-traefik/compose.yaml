services:
  SERVICE_NAME:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    container_name: ${SITE_NAME}
    restart: RESTART_POLICY
    volumes:
      - ./app:/app/public
    environment:
      - "SERVER_NAME=:80"
      - "SERVER_ROOT=/app/public"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SITE_NAME}.rule=Host(`${SITE_URL}`)"
      - "traefik.http.routers.${SITE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SITE_NAME}.tls.certresolver=le"
      - "traefik.http.services.${SITE_NAME}.loadbalancer.server.port=80"
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    deploy:
      resources:
        limits:
          cpus: 'CPU_LIMIT'
          memory: 'MEMORY_LIMIT'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

networks:
  web:
    external: true
