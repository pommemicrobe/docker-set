services:
  SERVICE_NAME:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
    container_name: ${SITE_NAME}
    restart: RESTART_POLICY
    volumes:
      - ./app:/app/public
    environment:
      - "SERVER_ROOT=/app/public"
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: 'CPU_LIMIT'
          memory: 'MEMORY_LIMIT'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
