services:
  SERVICE_NAME:
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
    container_name: ${SITE_NAME}
    restart: RESTART_POLICY
    volumes:
      - ./app:/app
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PM2_APP_NAME=${PM2_APP_NAME:-}
      - "DB_HOST=${DB_HOST:-mysql}"
      - "DB_PORT=${DB_PORT:-3306}"
      - "DB_DATABASE=${DB_DATABASE:-}"
      - "DB_USERNAME=${DB_USERNAME:-}"
      - "DB_PASSWORD=${DB_PASSWORD:-}"
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SITE_NAME}.rule=Host(`${SITE_URL}`)"
      - "traefik.http.routers.${SITE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SITE_NAME}.tls.certresolver=le"
      - "traefik.http.services.${SITE_NAME}.loadbalancer.server.port=3000"
    networks:
      - web
    deploy:
      resources:
        limits:
          cpus: 'CPU_LIMIT'
          memory: 'MEMORY_LIMIT'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

networks:
  web:
    external: true
